spring.application.name=apibanco
# Configurações de Conexão com o PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/backendav2
spring.datasource.username=postgres
spring.datasource.password=gerentedb
spring.datasource.driver-class-name=org.postgresql.Driver

# Configurações do Hibernate / JPA
# update: Cria as tabelas automaticamente se não existirem, e atualiza se você adicionar novas colunas
spring.jpa.hibernate.ddl-auto=update

# Exibe os comandos SQL no console (ótimo para estudos e testes)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Garante a compatibilidade com o dialeto do PostgreSQL
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# === JWT Configuration ===
# Chave secreta usada para assinar e verificar tokens JWT (minimo 32 caracteres para HS256)
jwt.secret=PortalEmprego2026ChaveSecretaJWTSuperSeguraHS256
# Tempo de validade do token: 86400000ms = 24 horas
jwt.expiration=86400000
